<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" type="image/ico" href="./src/assets/favicon.ico" />
    <title>SA Demo</title>
      <style>
          #root {
              height: 100vh;
              width: 100vw;
              background-image: url("./src/assets/DJI_0293_edit.jpg");
              background-size: cover;
              display: grid;
              place-items: center;
          }

          .nav-link {
              margin-top: 20px;
              text-align: center;
          }

          .nav-link a {
              color: #333;
              text-decoration: none;
              padding: 10px 20px;
              background-color: rgba(255, 255, 255, 0.9);
              border-radius: 5px;
              font-size: 0.9em;
              transition: background-color 0.2s;
          }

          .nav-link a:hover {
              background-color: rgba(255, 255, 255, 1);
          }

          .view {
              display: none;
          }

          .view.active {
              display: block;
          }
      </style>
  </head>
  <body>
  <div id="root">
      <!-- Login View -->
      <div id="login-view" class="view active">
          <div id="login-container">
              <spartan-login start-mode="webauthn" domain="http://localhost:11000" locale="en" redirect="/app.html" styles=".login-frame button {background-color: #00f000;} button.social-btn {background-color: #FFF;}"></spartan-login>
          </div>
          <div class="nav-link">
              <a onclick="changeLanguage()">Change Language</a>
          </div>
      </div>

      <!-- Invite View -->
      <div id="invite-view" class="view">
          <div id="invite-container">
              <spartan-invite domain="http://localhost:11000" locale="en" redirect="/app.html" styles=".invite-frame button {background-color: #00f000;}"></spartan-invite>
          </div>
          <div class="nav-link">
              <a href="#login">← Back to Login</a>
          </div>
      </div>
  </div>
  <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
        let lang = 0;

        // Language switcher (only for login view)
        function changeLanguage() {
          let langList = ['en', 'fr','es','ja'];
          lang = lang + 1;
          if (lang >= langList.length) {
            lang = 0;
          }

          // Update login widget
          let loginElem = document.querySelector('spartan-login');
          if (loginElem) {
            let parent = loginElem.parentNode;
            parent.removeChild(loginElem);
            let newElem = document.createElement('spartan-login');
            newElem.setAttribute('start-mode', 'webauthn');
            newElem.setAttribute('domain', 'http://localhost:11000')
            newElem.setAttribute('redirect', '/app.html');
            newElem.setAttribute('locale', langList[lang]);
            newElem.setAttribute('styles', '.login-frame button {background-color: #00f000;} button.social-btn {background-color: #FFF;}');
            parent.appendChild(newElem);
          }

          // Update invite widget if present
          let inviteElem = document.querySelector('spartan-invite');
          if (inviteElem) {
            inviteElem.setAttribute('locale', langList[lang]);
          }
        }

        // Simple hash-based routing
        function handleRoute() {
          const hash = window.location.hash.slice(1); // Remove the # character

          // Hide all views
          document.querySelectorAll('.view').forEach(view => {
            view.classList.remove('active');
          });

          if (hash.startsWith('invite')) {

            // Show invite view
            document.getElementById('invite-view').classList.add('active');

            // Update the invite widget with the sub from the URL
            const inviteWidget = document.querySelector('spartan-invite');
          } else {
            // Default to login view
            document.getElementById('login-view').classList.add('active');
          }
        }

        // Listen for hash changes
        window.addEventListener('hashchange', handleRoute);

        // Handle initial route on page load
        window.addEventListener('DOMContentLoaded', handleRoute);
    </script>
    <script src="./src/index.tsx" type="module"></script>
  </body>
</html>
